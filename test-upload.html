<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Upload Avatar</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8">
    <div class="max-w-2xl mx-auto bg-white p-8 rounded-lg shadow-lg">
        <h1 class="text-2xl font-bold mb-6">Test Upload Avatar</h1>
        
        <div class="mb-4">
            <label class="block text-sm font-bold mb-2">Token (dari session):</label>
            <input type="text" id="token" class="w-full border p-2 rounded" placeholder="Paste token di sini">
        </div>
        
        <div class="mb-4">
            <label class="block text-sm font-bold mb-2">Pilih Foto:</label>
            <input type="file" id="avatar" accept="image/*" class="w-full border p-2 rounded">
        </div>
        
        <button onclick="testUpload()" class="bg-blue-600 text-white px-6 py-3 rounded font-bold hover:bg-blue-700">
            Test Upload
        </button>
        
        <div id="result" class="mt-6 p-4 border rounded hidden">
            <h3 class="font-bold mb-2">Result:</h3>
            <pre id="resultText" class="bg-gray-100 p-4 rounded text-sm overflow-auto"></pre>
        </div>
        
        <div id="preview" class="mt-6 hidden">
            <h3 class="font-bold mb-2">Preview Foto:</h3>
            <img id="previewImg" class="w-64 h-64 object-cover rounded-lg border">
        </div>
    </div>

    <script>
        async function testUpload() {
            const token = document.getElementById('token').value;
            const fileInput = document.getElementById('avatar');
            const file = fileInput.files[0];
            
            if (!token) {
                alert('Masukkan token!');
                return;
            }
            
            if (!file) {
                alert('Pilih file!');
                return;
            }
            
            const formData = new FormData();
            formData.append('avatar', file);
            
            try {
                console.log('Uploading to: http://127.0.0.1:8000/api/profile/avatar');
                console.log('Token:', token);
                console.log('File:', file.name, file.size, 'bytes');
                
                const res = await fetch('http://127.0.0.1:8000/api/profile/avatar', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                    },
                    body: formData
                });
                
                const data = await res.json();
                
                console.log('Response status:', res.status);
                console.log('Response data:', data);
                
                // Show result
                document.getElementById('result').classList.remove('hidden');
                document.getElementById('resultText').textContent = JSON.stringify(data, null, 2);
                
                if (res.ok) {
                    document.getElementById('result').classList.add('bg-green-50', 'border-green-500');
                    document.getElementById('result').classList.remove('bg-red-50', 'border-red-500');
                    
                    // Show preview
                    if (data.avatar_url) {
                        document.getElementById('preview').classList.remove('hidden');
                        document.getElementById('previewImg').src = data.avatar_url;
                    }
                } else {
                    document.getElementById('result').classList.add('bg-red-50', 'border-red-500');
                    document.getElementById('result').classList.remove('bg-green-50', 'border-green-500');
                }
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('result').classList.remove('hidden');
                document.getElementById('result').classList.add('bg-red-50', 'border-red-500');
                document.getElementById('resultText').textContent = 'Error: ' + error.message;
            }
        }
    </script>
</body>
</html>
